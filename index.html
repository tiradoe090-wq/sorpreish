<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow: hidden;
}

.pantalla {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.activa {
  display: flex;
}

button {
  padding: 12px 25px;
  margin-top: 20px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  transition: 0.3s;
}

button:hover {
  background: #ffe6ea;
}

h1 {
  padding: 20px;
}
</style>
</head>

<body>

<!-- 🎵 Música -->
<audio id="musica" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- 💖 Pantallas -->
<div class="pantalla activa" id="p1">
  <h1>Hola mi amor 💖</h1>
  <button onclick="iniciar()">Toca aquí 😏</button>
</div>

<div class="pantalla" id="p2">
  <h1>Eres lo mejor que me ha pasado ✨</h1>
  <button onclick="siguiente(3)">Siguiente 💕</button>
</div>

<div class="pantalla" id="p3">
  <h1>No quiero perderte 🥺</h1>
  <button onclick="siguiente(4)">Siguiente 💔</button>
</div>

<div class="pantalla" id="p4">
  <h1>Perdón si a veces fallo 😢</h1>
  <button onclick="siguiente(5)">Siguiente 💖</button>
</div>

<div class="pantalla" id="p5">
  <h1>¿Me perdonas por las peleas? 💔</h1>
  <button onclick="siguiente(6)">Sí 💖</button>
</div>

<div class="pantalla" id="p6">
  <h1>Sabía que dirías que sí 😍</h1>
  <button onclick="siguiente(7)">Continuar 💕</button>
</div>

<div class="pantalla" id="p7">
  <h1>Perdón por cada momento difícil 🥺</h1>
  <button onclick="siguiente(8)">Siguiente 💘</button>
</div>

<div class="pantalla" id="p8">
  <h1>Eres lo más importante en mi vida ✨</h1>
  <button onclick="siguiente(9)">Siguiente 💖</button>
</div>

<div class="pantalla" id="p9">
  <h1>Prometo hacerte muy feliz 💕</h1>
  <button onclick="siguiente(10)">Último 😏</button>
</div>

<div class="pantalla" id="p10">
  <h1 style="font-size:50px;">TE AMO ❤️</h1>
</div>

<script>
function iniciar() {
  document.getElementById("musica").play();
  siguiente(2);
}

function siguiente(num) {
  document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));
  document.getElementById("p" + num).classList.add("activa");
}
</script>

</body>
</html>
