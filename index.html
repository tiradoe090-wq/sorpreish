<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
  color: white;
}

.container {
  margin-top: 80px;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 22px;
}

.botones {
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  margin: 10px;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;
}

.si {
  background: #00ff88;
  color: black;
}

.no {
  background: #ff4d6d;
  color: white;
  position: relative;
}

#mensaje {
  margin-top: 20px;
  font-size: 22px;
}

/* corazones */
.corazon {
  position: absolute;
  font-size: 20px;
  animation: flotar 6s linear infinite;
}

@keyframes flotar {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
  <h1>Para ti mi amor 💖</h1>

  <p>Perdón por las peleas 🥺</p>
  <p>¿Me perdonas?</p>

  <div class="botones">
    <button class="si" onclick="perdono()">Sí 💖</button>
    <button class="no" onmouseover="mover()">No 😢</button>
  </div>

  <button onclick="playMusic()">🎵 Activar música</button>

  <div id="mensaje"></div>
</div>

<!-- AUDIO -->
<audio id="musica" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function perdono() {
  document.getElementById("mensaje").innerHTML =
    "Sabía que dirías que sí 😍💖<br>Perdón por todo 🥺<br>Eres lo mejor que tengo<br><h2>TE AMO ❤️</h2>";
}

function mover() {
  let btn = document.querySelector(".no");
  btn.style.position = "absolute";
  btn.style.top = Math.random() * 80 + "%";
  btn.style.left = Math.random() * 80 + "%";
}

function playMusic() {
  document.getElementById("musica").play();
}

/* corazones flotando */
for (let i = 0; i < 25; i++) {
  let heart = document.createElement("div");
  heart.className = "corazon";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
